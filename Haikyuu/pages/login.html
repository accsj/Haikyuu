<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haikyuu!</title>
    <link rel="stylesheet" href="/styles/loginregister.css">
    <link rel="shortcut icon" href="/styles/imgs/Haikyuu-logo.png">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header class="cabecalho">
        <a href="/index.html"><img class='cabecalho-logo' src="/styles/imgs/Haikyuu-logo.png" alt="Logo"></a>
    </header>
    <main class="box">
        <div class="loginregister-box">
            <a href="/index.html"><i class='bx bx-chevron-left'></i></a>
            <a href="/pages/login.html"><h1>Login</h1></a>
            <form>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Senha" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>

                <div class="remember-forgot">
                    <label><input type="checkbox">Lembre-se de mim</label>
                    <a href="/pages/recovery.html">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-login">Login</button>

                <div class="register-link">
                    <p>Não tem uma conta? <a href="/pages/registro.html">Registre-se</a></p>

                </div>
            </form>
        </div>
    </main>
</body>
</html>
