<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haikyuu!</title>
    <link rel="stylesheet" href="/styles/loginregister.css">
    <link rel="shortcut icon" href="/styles/imgs/Haikyuu-logo.png">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header class="cabecalho">
        <a href="/index.html"><img class='cabecalho-logo' src="/styles/imgs/Haikyuu-logo.png" alt="Logo"></a>
    </header>
    
    <main class="box">
        <div class="loginregister-box">
            <a href="/index.html"><i class='bx bx-chevron-left'></i></a>
            <h1>Recovery</h1>
            <form>
                <div class="input-box">
                    <input type="text" placeholder="Digite o seu Email">
                    <i class='bx bxs-envelope'></i>
                </div>

                <button type="submit" class="btn-login2"><i class='bx bx-right-arrow-alt'></i></button>
            </form>
        </div>
    </main>
</body>
</html>
