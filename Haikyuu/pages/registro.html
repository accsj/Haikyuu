<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haikyuu!</title>
    <link rel="stylesheet" href="/styles/loginregister.css">
    <link rel="shortcut icon" href="/styles/imgs/Haikyuu-logo.png">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header class="cabecalho">
        <a href="/index.html"><img class='cabecalho-logo' src="/styles/imgs/Haikyuu-logo.png" alt="Logo"></a>
    </header>

    <main class="box">
        <div class="loginregister-box">
            <a href="/index.html"><i class='bx bx-chevron-left'></i></a>
            <a href="/pages/registro.html"><h1>Registro</h1></a>
            <form>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>

                <div class="input-box">
                    <input type="text" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                
                <div class="input-box">
                    <input type="password" placeholder="Senha" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Confirme sua senha" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>

                <button type="submit" class="btn-login">Criar conta</button>
            </form>
        </div>

    </main>
</body>
</html>
